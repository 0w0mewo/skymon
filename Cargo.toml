[package]
name = "skymon"
version = "0.1.0"
edition = "2024"

[dependencies]
map_3d = "0.1.7"
thiserror = "2"
anyhow = "1.0"
crossbeam = "0.8"
time = {version = "0.3", features = ["parsing", "local-offset"] }
rusqlite = { version = "0.40", features = ["bundled", "time"] }
cli-table = {version = "0.5", features = ["derive"]}
ctrlc="3.5"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
strip = true